<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATM Simulator</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> 
  <link rel="stylesheet" href="css/atm-simulator.css">
  <style>.pin-wrapper {
  position: relative;
  width: 250px;
}

.pin-wrapper {
  width: 100%;
}

#pin:focus {
  border-color: #007bff;
  box-shadow: 0 0 5px rgba(0,123,255,0.3);
}

.toggle-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #777;
  transition: 0.2s ease;
}

.toggle-eye:hover {
  color: #007bff;
  transform: translateY(-50%) scale(1.1);
}</style>
</head>

<body>

<div class="card">

  <!-- 🔵 Header -->
  <div class="header">
    <div class="brand">
      <img src="image/Logo.png">
    </div>

    <div class="nav">
      <a href="index.html">index</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <div class="body">

    <!-- 🟢 Sidebar -->
    <div class="sidebar">
      <a class="item" href="dashboard.html">Dashboard</a>
      <a class="item" href="bank.html">Transfer</a>
      <a class="item" href="card.html">Card</a>
      <a class="item active" href="atm.html">ATM</a>
      <a class="item" href="profile.html">Profile</a>
      <a class="item" href="login.html">Logout</a>
    </div>

    <!-- 🟢 Main -->
    <div class="main">

      
      <div class="send-box">

        <h2 style="text-align:center; margin-bottom:15px;">
          🏧 ATM Simulator
        </h2>

        <div class="pin-wrapper">
  <input type="password" id="pin" placeholder="Enter PIN" maxlength="4">
  <span class="toggle-eye" onclick="togglePIN(this)">
    <i id="eyeIcon" class="fa-solid fa-eye"></i>
  </span>
</div>

        <input type="text" id="otp" placeholder="Enter OTP">

        <input type="number" id="amount" placeholder="Enter Amount">

        <button id="withdrawBtn">Withdraw</button>
        <button id="backBtn">⬅ Back to ATM</button>

        <div id="atmMessage" class="atm-message"></div>

      </div>

    </div>

  </div>

</div>
<script>
function togglePIN(el) {
  const pin = document.getElementById("pin");
  const icon = el.querySelector("i");

  // حركة بسيطة (feedback زي البنوك)
  el.style.transform = "translateY(-50%) scale(0.9)";

  setTimeout(() => {
    el.style.transform = "translateY(-50%) scale(1)";
  }, 100);

  if (pin.type === "password") {
    pin.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    pin.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}
</script>
 
</body>
</html>
