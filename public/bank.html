<head>

<!-- jQuery -->

<!-- JS لـ Select2 -->

  <title>Bank Transfer Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-yZq0wJXDhM2XkZ1EohqY7yFQ17kRJhT1BvDIt9bKn2ibR0QhVj7rZrQHDmCzLAdbR6BzuEz0Q1U3+v7NznYQyA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * {box-sizing: border-box; margin: 0; padding: 0;}
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: url('https://www.firstbankeg.com/UserFiles/NewsSizes/1920/2023/09/24/17792.jpg?230924102238') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 850px;
      max-width: 100%;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(234, 248, 240, 0.6);
      padding: 16px 22px;
      animation: slideDown 0.8s ease;
    }

    @keyframes slideDown {
      from {transform: translateY(-20px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

    .header .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header .brand img {
      height: 50px;
      border-radius: 6px;
      transition: transform 0.4s;
    }

    .header .brand img:hover {
      transform: scale(1.1);
    }

    .nav a {
      text-decoration: none;
      color: #064a31;
      font-weight: 600;
      margin-left: 18px;
      position: relative;
      transition: color 0.3s;
    }

    .nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #0b6b4a;
      transition: width 0.3s;
    }

    .nav a:hover::after {
      width: 100%;
    }

    .nav a:hover {
      color: #0b6b4a;
    }

    .body {
      display: flex;
      animation: fadeUp 1.2s ease;
    }

    @keyframes fadeUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .sidebar {
      width: 180px;
      background: rgba(247, 251, 249, 0.6);
      border-right: 2px solid rgba(213, 233, 219, 0.7);
      padding: 20px 15px;
    }

    .sidebar .item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: #0b6b4a;
      margin-bottom: 16px;
      transition: all 0.3s;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
    }
    .sidebar .item {
  display: flex;
  align-items: center;
  gap: 10px;        /* المسافة بين الصورة والنص */
  text-decoration: none; /* يشيل الخط تحت النص */
  color: #000;      /* لون النص */
  font-weight: 600; /* optional لو عايز نفس الوزن السابق */
}


    .sidebar .item img {
      width: 20px;
      height: 20px;
    }

    .sidebar .item:hover {
      background: rgba(223, 242, 230, 0.7);
      transform: translateX(5px);
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 25px;
      animation: fadeUp 1.4s ease;
      width: 100%;
    }

    .account-box {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #cfe7d6;
      border-radius: 12px;
      padding: 18px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin-bottom: 10px;
    }

    .account-box h3 {
      margin: 0;
      color: #064a31;
      font-size: 20px;
    }

    .account-box p {
      margin: 0;
      font-weight: 600;
      color: #064a31;
    }

    .transfer-form {
      background: rgba(255, 255, 255, 0.8);
      border: 2px solid #cfe7d6;
      border-radius: 20px;
      padding: 20px;
      animation: fadeUp 1.6s ease;
    }

    .icon-bar {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .icon-bar .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 20px;
      border-radius: 12px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .icon-bar .icon img {
      width: 45px;
      height: 45px;
      transition: transform 0.3s;
    }

    .icon-bar .icon:hover img {
      transform: scale(1.1);
    }

    .icon-bar .icon.active {
      background: rgba(11, 107, 74, 0.12);
      box-shadow: 0 0 10px rgba(11, 107, 74, 0.25);
    }

    .icon-bar span {
      font-weight: 600;
      color: #064a31;
    }

    .transfer-form input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1.8px solid #b8dbcb;
      border-radius: 8px;
      font-size: 15px;
      transition: box-shadow 0.3s, border-color 0.3s;
    }

    .transfer-form input:focus {
      outline: none;
      border-color: #0b6b4a;
      box-shadow: 0 0 6px rgba(11,107,74,0.3);
    }

    .transfer-form button {
      display: block;
      width: 48%;
      padding: 12px;
      background: #0b6b4a;
      color: #fff;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      margin-top: 10px;
    }

    .transfer-form button:hover {
      background: #097043;
      transform: scale(1.03);
    }

    .step-2 {display: none;}
    .confirm-details p {margin-bottom: 8px; color: #064a31; font-weight: 600;}

    @media(max-width: 720px) {
      .body {flex-direction: column;}
      .sidebar {width: 100%; display: flex; justify-content: space-around; border-right: none; border-bottom: 2px solid rgba(213, 233, 219, 0.7);}
      .transfer-form button {width: 100%; margin-top: 10px;}
    }
    /* تعديل شكل select عشان يكون زي باقي الحقول */
form#step1 select {
  width: 100%;           /* نفس عرض الحقول */
  padding: 10px 12px;    /* نفس padding بتاع input */
  margin-bottom: 12px;   /* نفس المسافة بين الحقول */
  border: 1.8px solid #b8dbcb; /* نفس حدود input */
  border-radius: 8px;    /* نفس radius */
  font-size: 15px;       /* نفس حجم الخط */
  background-color: #fff; /* لون خلفية أبيض */
  appearance: none;      /* يشيل الشكل الافتراضي للـ select */
  -webkit-appearance: none; 
  -moz-appearance: none;
}

form#step1 select:focus {
  outline: none;
  border-color: #0b6b4a;
  box-shadow: 0 0 6px rgba(11,107,74,0.3);
}
/* تعديل شكل select2 ليكون زي باقي الحقول */
.select2-container--default .select2-selection--single {
    height: 45px; /* نفس ارتفاع باقي الحقول */
    padding: 10px 12px; /* نفس padding بتاع input */
    border: 1.8px solid #b8dbcb; /* نفس حدود input */
    border-radius: 8px; /* نفس radius */
    background-color: #fff; /* خلفية أبيض */
}

.select2-container--default .select2-selection--single .select2-selection__rendered {
    line-height: 25px; /* يوازن النص وسط الحقل */
    font-size: 15px;   /* نفس حجم الخط */
    color: #000;
}

.select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 100%;
    right: 10px;
}
/* إضافة نفس المسافة بين الـ select2 وباقي الحقول */
.select2-container {
    margin-bottom: 12px; /* نفس المسافة بين الحقول */
}


  </style>
</head>
<body>
  <div class="card">

      </a> 
      </div>
      <nav class="nav">
        <a href="#">About</a>

        <a href="login.html">Login</a>
        <a href="bank.html">Register</a>
      </nav>
    </header>

   <div class="body">
  <aside class="sidebar">
    <a href="dashboard.html" class="item">
      <img src="image/layout.png" alt="Dashboard Logo">
      Dashboard
    </a>

    <a href="bank.html" class="item">
      <img src="image/arrows.png" alt="Transfer Logo">
      Transfer
    </a>

    <a href="card.html" class="item">
      <img src="image/card.png" alt="Card Logo">
      Card
    </a>

    <a href="profile.html" class="item">

    <a href="logout.html" class="item">

     <main class="main">

  <!-- البوكس بقى فوق هنا -->
  <section class="account-box">
    <div>
      <h3>Account Details</h3>
      <h3 username: id="userNameDisplay">User Name</h3>
      <p><strong id="accountNumberDisplay">Account Number</strong></p>
    </div>
  </section>

  <section class="transfer-form">

    <div class="icon-bar">
      <a class="icon active" href="bank.html">
        <img src="https://i.postimg.cc/4ytt1NLd/mobile-banking-1.png" alt="Bank">

      <a class="icon" href="wallet.html">

      <a class="icon" href="atm.html">

      </a>

    <h4>Send Money</h4>

    <!-- STEP 1 -->
    <form id="step1">
      <select id="bank" name="bank" required>
        <option value="" disabled selected>bank name</option>
        <option value="banque misr">banque misr</option>
        <option value="national bank of egypt">national bank of egypt</option>
        <option value="CIB">CIB</option>
        <option value="QNB">QNB</option>
        <option value="arab international bank">arab international bank</option>
        <option value="ADIB">ADIB</option>
        <option value="ALEX bank">ALEX bank</option>
        <option value="housing & development bank">housing & development bank</option>
        <option value="NBK">NBK</option>
        <option value="FAB">FAB</option>
        <option value="ARAB bank">ARAB bank</option>
        <option value="Banque cairo">Banque cairo</option>
        <option value="HSPC">HSPC</option>
      </select>
 <input type="text" id="benefName" placeholder="Beneficiary Name" required>
  <input type="text" id="benefAccount" placeholder="Account Number" pattern="\d+" required>
  <input type="number" id="amount" placeholder="Amount" required>
      <button type="submit">Next</button>
    </form>

    <!-- STEP 2 -->
    <form id="step2" class="step-2" style="display:none;">
      <h4>Confirm Transfer</h4>
      <div class="confirm-details"></div>

      <button type="button" id="backBtn">Back</button>
      <button type="button" id="nextToPwd">Next</button>
    </form>

  <!-- STEP 3 (PASSWORD CONFIRMATION) -->
<form id="stepPwd" class="step-pwd" style="display:none;">
  <h4>Enter Password to Confirm</h4>
  <input type="password" id="pwd" placeholder="Password" required>
  <input type="password" id="pwdConfirm" placeholder="Confirm Password" required>
  <p id="pwdError" style="color:red; font-size:14px;"></p>
  <button type="button" id="pwdBack">Back</button>
  <button type="submit">Confirm Transfer</button>
</form>

  </section>

    </div>

<script>

 

/* ======================================================
   عرض بيانات المستخدم من localStorage
====================================================== */
const currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");
 if (!currentUser || !currentUser._id) {
  alert("لازم تسجل دخول الأول");
  window.location.href = "login.html";
}
if (currentUser) {
  function maskAccountNumber(acct) {
    if (!acct) return "No Account";
    const s = String(acct).trim();
    if (s.length <= 4) return s;
    return "*".repeat(s.length - 4) + s.slice(-4);
  }

 document.getElementById("userNameDisplay").textContent =
  currentUser.firstName + " " + currentUser.lastName;

 if (currentUser) {

  // عرض الاسم
  document.getElementById("userNameDisplay").textContent =
    currentUser.firstName + " " + currentUser.lastName;

  // جلب رقم الحساب من الكارت
  (async () => {
    try {
      const res = await fetch(
        `http://localhost:3000/card/${currentUser._id}`
      );

      if (res.ok) {
        const data = await res.json();

        function maskAccountNumber(acct) {
          const s = String(acct);
          if (s.length <= 4) return s;
          return "*".repeat(s.length - 4) + s.slice(-4);
        }

        document.getElementById("accountNumberDisplay").textContent =
          maskAccountNumber(data.card.accountNumber);
      } else {
        document.getElementById("accountNumberDisplay").textContent =
          "No Account";
      }
    } catch (err) {
      console.error(err);
      document.getElementById("accountNumberDisplay").textContent =
        "No Account";
    }
  })();
}

}

/* ======================================================
   عناصر الصفحة
====================================================== */
const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const stepPwd = document.getElementById("stepPwd");

const confirmDiv = step2.querySelector(".confirm-details");
const backBtn = document.getElementById("backBtn");
const nextToPwd = document.getElementById("nextToPwd");
const pwdBack = document.getElementById("pwdBack");

const pwd = document.getElementById("pwd");
const pwdConfirm = document.getElementById("pwdConfirm");
const pwdError = document.getElementById("pwdError");

// قراءة القيم من الخطوة الأولى
function getTransferValues() {
  return {
    bank: document.getElementById("bank").value,
    beneficiaryName: document.getElementById("benefName").value,
    beneficiaryAccount: document.getElementById("benefAccount").value,
    amount: document.getElementById("amount").value,
  };
}

/* ======================================================
   STEP 1 → STEP 2
====================================================== */
step1.addEventListener("submit", function (e) {
  e.preventDefault();

  const data = getTransferValues();

  if (!data.bank || !data.beneficiaryName || !data.beneficiaryAccount || !data.amount) {
    alert("Please fill all fields.");
    return;
  }

  confirmDiv.innerHTML = `
    <p><strong>Bank:</strong> ${data.bank}</p>
    <p><strong>Name:</strong> ${data.beneficiaryName}</p>
    <p><strong>Account:</strong> ${data.beneficiaryAccount}</p>
    <p><strong>Amount:</strong> ${data.amount}</p>
  `;

  step1.style.display = "none";
  step2.style.display = "block";
});

/* ======================================================
   STEP 2 → BACK
====================================================== */
backBtn.addEventListener("click", function () {
  step2.style.display = "none";
  step1.style.display = "block";
});

/* ======================================================
   STEP 2 → STEP 3
====================================================== */
nextToPwd.addEventListener("click", function () {
  step2.style.display = "none";
  stepPwd.style.display = "block";
});

/* ======================================================
   STEP 3 → BACK
====================================================== */
pwdBack.addEventListener("click", function () {
  stepPwd.style.display = "none";
  step2.style.display = "block";
});

/* ======================================================
   STEP 3 → SUBMIT FINAL TRANSFER
====================================================== */
stepPwd.addEventListener("submit", async function (e) {
  e.preventDefault();
console.log("CONFIRM TRANSFER CLICKED");

  const data = getTransferValues();

  // تأكد إن الباسوردات متطابقة
  if (pwd.value !== pwdConfirm.value) {
    pwdError.textContent = "Passwords do not match!";
    return;
  }

  pwdError.textContent = "";

  // تحقق الباسورد من الباك اند
  const check = await fetch("http://localhost:3000/transfer/check-card-password", {

    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId: currentUser._id,
      password: pwd.value
    })
  });

  const checkResult = await check.json();

  if (!check.ok) {
    pwdError.textContent = checkResult.message;
    return;
  }

  // تنفيذ عملية التحويل
  const transfer = await fetch("http://localhost:3000/transfer/bank-transfer", {

    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId: currentUser._id,
      ...data
    })
  });

  const transResult = await transfer.json();

 if (!transfer.ok) {
  pwdError.textContent = transResult.message || "Transfer failed.";
  return;
}

// ✅ تحديث الرصيد في localStorage
currentUser.balance = transResult.newBalance;
localStorage.setItem("currentUser", JSON.stringify(currentUser));

alert("Transfer Successful!");
stepPwd.reset();
stepPwd.style.display = "none";
step1.style.display = "block";

});


</script>
