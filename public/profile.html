<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | CA Bank</title>

<style>
/* تصفير الإعدادات الافتراضية */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  /* الخلفية ثابتة وبتملا الشاشة بشكل احترافي */
  background: url('https://www.firstbankeg.com/UserFiles/NewsSizes/1920/2023/09/24/17792.jpg?230924102238') center/cover no-repeat fixed;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* الكارت الرئيسي - شفاف ومرن */
.card {
  width: 100%;
  max-width: 900px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  overflow: hidden;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* الهيدر */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.8);
  padding: 15px 25px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.header img { height: 45px; }

.nav { display: flex; gap: 15px; }
.nav a {
  text-decoration: none;
  color: #064a31;
  font-weight: 600;
  font-size: 14px;
  transition: 0.3s;
}
.nav a:hover { color: #0b6b4a; }

/* تقسيمة الصفحة */
.body { display: flex; min-height: 500px; }

/* السايد بار */
.sidebar {
  width: 220px;
  background: rgba(245, 250, 247, 0.7);
  padding: 25px 15px;
  border-right: 1px solid rgba(0,0,0,0.05);
}

.sidebar .item {
  margin-bottom: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.sidebar .item a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  text-decoration: none;
  color: #0b6b4a;
  font-weight: 600;
}

.sidebar .item:hover, .sidebar .item.active {
  background: #0b6b4a;
}

.sidebar .item:hover a, .sidebar .item.active a {
  color: white;
}

.sidebar .item img { width: 20px; filter: contrast(0.5); }
.sidebar .item:hover img, .sidebar .item.active img { filter: brightness(0) invert(1); }

/* الجزء الرئيسي */
.main { flex: 1; padding: 30px; }

.profile-box {
  background: white;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.profile-box h3 { color: #064a31; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

.profile-row {
  display: flex;
  justify-content: space-between;
  padding: 15px 0;
  border-bottom: 1px solid #f0f0f0;
}

.profile-row:last-child { border-bottom: none; }
.profile-row .label { font-weight: 600; color: #666; }
.profile-row .value { color: #333; font-weight: 500; }

/* الأزرار */
.btn-container { display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

#editBtn, #saveBtn, #savePassBtn { background: #0b6b4a; color: white; }
#changePassBtn { background: #064a31; color: white; }
#cancelBtn { background: #dc3545; color: white; }
button:hover { opacity: 0.9; transform: translateY(-2px); }

/* --- استايل الموبايل (Responsive) --- */
@media(max-width: 768px) {
  body { padding: 10px; }
  
  .header { flex-direction: column; gap: 15px; text-align: center; }
  
  .body { flex-direction: column; }
  
  .sidebar {
    width: 100%;
    display: flex;
    overflow-x: auto;
    padding: 10px;
    border-right: none;
    border-bottom: 1px solid #ddd;
  }
  
  .sidebar .item { margin-bottom: 0; flex-shrink: 0; }
  
  .main { padding: 15px; }

  .profile-row {
    flex-direction: column;
    gap: 5px;
  }
  
  .btn-container button { width: 100%; }
}
</style>
</head>
<body>

<div class="card">
  <header class="header">
    <img src="https://i.postimg.cc/QCrwp4pC/Picsart-25-10-01-17-11-01-636.png" alt="CA Bank Logo">
    <nav class="nav">
      <a href="#">About</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
      <a href="register.html">Sign Up</a>
    </nav>
  </header>

  <div class="body">
    <aside class="sidebar">
      <div class="item"><a href="dashboard.html"><img src="https://i.postimg.cc/Dyp5hp80/dashboard.png">Dashboard</a></div>
      <div class="item"><a href="bank.html"><img src="https://i.postimg.cc/J06F91fn/arrows.png">Transfer</a></div>
      <div class="item"><a href="card.html"><img src="https://i.postimg.cc/h41c2ThY/debit-card.png">Card</a></div>
      <div class="item active"><a href="profile.html"><img src="https://i.postimg.cc/0292vZLx/account.png">Profile</a></div>
      <div class="item"><a href="#" id="logoutBtn"><img src="https://i.postimg.cc/fycLKrpP/logout.png">Logout</a></div>
    </aside>

    <main class="main">
      <div class="profile-box">
        <h3>Profile Details</h3>
        <div class="profile-row"><span class="label">First Name</span><span class="value" id="firstName">Amira</span></div>
        <div class="profile-row"><span class="label">Last Name</span><span class="value" id="lastName">Mohamed</span></div>
        <div class="profile-row"><span class="label">National ID</span><span class="value" id="nationalId">93154728462415</span></div>
        <div class="profile-row"><span class="label">Email</span><span class="value" id="email">AMIRA22@gmail.com</span></div>
        <div class="profile-row"><span class="label">Phone</span><span class="value" id="phone">01122845177</span></div>
        <div class="profile-row"><span class="label">Date of Birth</span><span class="value" id="dob">5/22/2006</span></div>

        <div class="btn-container">
          <button id="editBtn">Edit information</button>
          <button id="changePassBtn">Change password</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/profile.js"></script>
</body>
</html>
