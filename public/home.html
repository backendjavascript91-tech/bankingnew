<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Home</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

/* BACKGROUND */
body{
  background: linear-gradient(135deg, #e6f0ec, #f8f9f9);
}

/* NAVBAR */
.top-nav{
  width:90%;
  margin:20px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.logo img{
  width:70px;
}

.top-nav ul{
  display:flex;
  gap:30px;
  list-style:none;
}

.top-nav a{
  text-decoration:none;
  color:#083c24;
  font-weight:bold;
}

.signup{
  border:2px solid #083c24;
  padding:5px 10px;
  border-radius:8px;
}

/* MAIN */
.home{
  display:flex;
  width:90%;
  margin:20px auto;
  gap:20px;
  height:80vh;
}

/* HERO */
.hero{
  flex:1;
  background:url("image/banki-online-4.jpg") no-repeat center/cover;
  border-radius:20px;
  position:relative;
  color:white;
  overflow:hidden;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

.hero-content{
  position:absolute;
  bottom:40px;
  left:40px;
  z-index:2;
}

.hero h1{
  font-size:38px;
  margin-bottom:10px;
}

.hero p{
  font-size:18px;
}

.hero button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:white;
  color:#2f8a64;
  cursor:pointer;
}

/* SERVICES */
.services{
  flex:1;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:30px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.services h2{
  margin-bottom:25px;
  color:#083c24;
  font-size:26px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.7);
  padding:25px;
  border-radius:15px;
  transition:0.3s;
  cursor:pointer;
  box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

.card .icon{
  font-size:30px;
  margin-bottom:10px;
}

.card h3{
  margin-bottom:8px;
}

.card p{
  font-size:14px;
  color:#555;
}

.card:hover{
  background:#2f8a64;
  color:white;
  transform:translateY(-7px);
  box-shadow:0 15px 25px rgba(0,0,0,0.2);
}

/* MOBILE */
@media(max-width:768px){
  .home{
    flex-direction:column;
    height:auto;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
  <div class="logo">
    <img src="image/Picsart_25-10-01_17-11-01-636.png">
  </div>

  <ul>
    <li><a href="home.html">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="#">Login</a></li>
    <li><a href="#" class="signup">Sign Up</a></li>
  </ul>
</div>

<!-- MAIN -->
<div class="home">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>Enjoy new services now</h1>
      <p>banki Mobile</p>
      <button>Know More</button>
    </div>
  </div>

  <!-- SERVICES -->
  <div class="services">
    <h2>Check your products</h2>

    <div class="cards">

      <div class="card">
        <div class="icon">💳</div>
        <h3>Accounts</h3>
        <p>View your account</p>
      </div>

      <div class="card">
        <div class="icon">📈</div>
        <h3>Save & Invest</h3>
        <p>Grow your money</p>
      </div>

      <div class="card">
        <div class="icon">💰</div>
        <h3>Finance</h3>
        <p>Get a loan</p>
      </div>

      <div class="card">
        <div class="icon">🚗</div>
        <h3>Buy a Car</h3>
        <p>Car services</p>
      </div>

    </div>
  </div>

</div>

</body>
</html>
