<script>
document.addEventListener("DOMContentLoaded", function () {

  const checkbox = document.getElementById("termsCheckbox");
  const nextBtn = document.querySelector(".nextBtn");

  // الحالة الابتدائية
  nextBtn.disabled = !checkbox.checked;

  // عند التغيير
  checkbox.addEventListener("change", function () {
    nextBtn.disabled = !this.checked;
  });

});
</script>
<script>
const emailUser = document.getElementById("emailUser");
const emailDomain = document.getElementById("emailDomain");
const error = document.getElementById("emailError");
const nextBtn = document.getElementById("nextBtn");

let currentDomain = emailDomain.value;

// تحديث عند تغيير الدومين
emailDomain.addEventListener("change", function () {
  currentDomain = this.value;
  validate();
});

// منع أي كتابة بعد @ أو رموز غلط
emailUser.addEventListener("input", function () {
  let value = emailUser.value;

  // ❌ منع أي @ أو دومين
  value = value.replace(/@.*/, "");

  // ❌ منع مسافات
  value = value.replace(/\s/g, "");

  emailUser.value = value;

  validate();
});

// validation الرئيسي
function validate() {
  const username = emailUser.value.trim();

  const fullEmail = username + currentDomain;

  // حفظ الإيميل النهائي (لو هتبعته للباك)
  document.getElementById("emailHidden")?.remove();

  let hidden = document.createElement("input");
  hidden.type = "hidden";
  hidden.id = "emailHidden";
  hidden.value = fullEmail;
  document.body.appendChild(hidden);

  // validation
  if (username === "") {
    error.textContent = "Email is required";
    nextBtn.disabled = true;
    return;
  }

  if (username.includes("@")) {
    error.textContent = "Invalid email format";
    nextBtn.disabled = true;
    return;
  }

  error.textContent = "";
  nextBtn.disabled = false;
}
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const phone = document.getElementById("phonenumber");
  const error = document.getElementById("phoneError");

  if (!phone) return;

  // 🔒 منع أي حاجة غير أرقام (حتى paste)
  phone.addEventListener("input", function () {
    this.value = this.value.replace(/[^0-9]/g, "").slice(0, 11);
    validate();
  });

  function validate() {
    const value = phone.value;

    if (value.length === 0) {
      error.textContent = "Phone number is required";
    } 
    else if (value.length < 11) {
      error.textContent = "Phone number must be 11 digits";
    } 
    else {
      error.textContent = "";
    }
  }

});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const nid = document.getElementById("nationalId");
  const error = document.getElementById("nidError");

  if (!nid) return;

  nid.addEventListener("input", function () {
    // 🔒 أرقام فقط + 14 رقم
    this.value = this.value.replace(/[^0-9]/g, "").slice(0, 14);

    validate();
  });

  function validate() {
    const value = nid.value;

    if (value.length === 0) {
      error.textContent = "National ID is required";
    } 
    else if (value.length < 14) {
      error.textContent = "National ID must be 14 digits";
    } 
    else {
      error.textContent = "";
    }
  }

});
</script>
